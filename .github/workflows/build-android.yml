name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Sign APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk MSE.apk
          # Re-align and sign for clean install
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -f 4 MSE.apk MSE-aligned.apk
          keytool -genkeypair -v -keystore release.keystore -alias mse -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=MSE"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign --ks release.keystore --ks-pass pass:android --key-pass pass:android --out MSE-signed.apk MSE-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MSE
          path: MSE-signed.apk
